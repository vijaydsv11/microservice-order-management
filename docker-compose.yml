services:
  auth-db:
    image: mysql:8.0
    container_name: auth-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_db
    ports:
      - "3307:3306"
    volumes:
      - auth-db-volume:/var/lib/mysql
    networks:
      - microservices-network
    healthcheck:
      test:
        ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  user-db:
    image: mysql:8.0
    container_name: user-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: user_db
    ports:
      - "3308:3306"
    volumes:
      - user-db-volume:/var/lib/mysql
    networks:
      - microservices-network
    healthcheck:
      test:
        ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  order-db:
    image: mysql:8.0
    container_name: order-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: order_db
    ports:
      - "3309:3306"
    volumes:
      - order-db-volume:/var/lib/mysql
    networks:
      - microservices-network
    healthcheck:
      test:
        ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  inventory-db:
    image: mysql:8.0
    container_name: inventory-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: inventory_db
    ports:
      - "3310:3306"
    volumes:
      - inventory-db-volume:/var/lib/mysql
    networks:
      - microservices-network
    healthcheck:
      test:
        ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  payment-db:
    image: mysql:8.0
    container_name: payment-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: payment_db
    ports:
      - "3311:3306"
    volumes:
      - payment-db-volume:/var/lib/mysql
    networks:
      - microservices-network
    healthcheck:
      test:
        ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - microservices-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
      - "29092:29092"
    networks:
      - microservices-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1",
        ]
      interval: 15s
      timeout: 10s
      retries: 10

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8085:8080"
    networks:
      - microservices-network

  zipkin:
    image: openzipkin/zipkin:latest
    container_name: zipkin
    restart: unless-stopped
    ports:
      - "9411:9411"
    networks:
      - microservices-network

  eureka-server:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: eureka-server
    image: microservices/eureka-server:local
    pull_policy: never
    container_name: eureka-server
    restart: unless-stopped
    environment:
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      CONFIG_SERVER_URL: http://config-server:8888
    depends_on:
      - zipkin
    ports:
      - "8761:8761"
    networks:
      - microservices-network

  config-server:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: config-server
    image: microservices/config-server:local
    pull_policy: never
    container_name: config-server
    restart: unless-stopped
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      CONFIG_REPO_URI: https://github.com/spring-cloud-samples/config-repo
    depends_on:
      - eureka-server
      - zipkin
    ports:
      - "8888:8888"
    networks:
      - microservices-network

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: auth-service
    image: microservices/auth-service:local
    pull_policy: never
    container_name: auth-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://auth-db:3306/auth_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      auth-db:
        condition: service_healthy
      config-server:
        condition: service_started
      eureka-server:
        condition: service_started
    ports:
      - "8081:8081"
    networks:
      - microservices-network

  user-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: user-service
    image: microservices/user-service:local
    pull_policy: never
    container_name: user-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://user-db:3306/user_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      user-db:
        condition: service_healthy
      config-server:
        condition: service_started
      eureka-server:
        condition: service_started
    ports:
      - "8082:8082"
    networks:
      - microservices-network

  order-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: order-service
    image: microservices/order-service:local
    pull_policy: never
    container_name: order-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://order-db:3306/order_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: kafka:9092
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      order-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_started
      eureka-server:
        condition: service_started
    ports:
      - "8083:8083"
    networks:
      - microservices-network

  inventory-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: inventory-service
    image: microservices/inventory-service:local
    pull_policy: never
    container_name: inventory-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://inventory-db:3306/inventory_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: kafka:9092
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      inventory-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_started
      eureka-server:
        condition: service_started
    ports:
      - "8084:8084"
    networks:
      - microservices-network

  payment-service:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: payment-service
    image: microservices/payment-service:local
    pull_policy: never
    container_name: payment-service
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://payment-db:3306/payment_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      KAFKA_BROKERS: kafka:9092
      SPRING_CLOUD_STREAM_KAFKA_BINDER_BROKERS: kafka:9092
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    depends_on:
      payment-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_started
      eureka-server:
        condition: service_started
    ports:
      - "8086:8086"
    networks:
      - microservices-network

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile.service
      args:
        SERVICE_NAME: api-gateway
    image: microservices/api-gateway:local
    pull_policy: never
    container_name: api-gateway
    restart: unless-stopped
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka
      ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
      JWT_SECRET: your-secret-key-change-this-in-production-your-secret-key-change-this-in-production
    depends_on:
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      order-service:
        condition: service_started
      inventory-service:
        condition: service_started
      payment-service:
        condition: service_started
      eureka-server:
        condition: service_started
      config-server:
        condition: service_started
    ports:
      - "8080:8080"
    networks:
      - microservices-network

volumes:
  auth-db-volume:
  user-db-volume:
  order-db-volume:
  inventory-db-volume:
  payment-db-volume:

networks:
  microservices-network:
    driver: bridge
