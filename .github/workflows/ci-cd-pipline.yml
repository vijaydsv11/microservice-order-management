name: CI-CD-Pipline

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      registry:
        description: "Container registry (e.g., ghcr.io)"
        required: false
        default: "ghcr.io"
      image_namespace:
        description: "Image namespace/organization (default: repository owner)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka-server
          - config-server
          - api-gateway
          - auth-service
          - user-service
          - order-service
          - inventory-service
          - payment-service

    env:
      REGISTRY: ${{ github.event.inputs.registry || vars.CONTAINER_REGISTRY || 'ghcr.io' }}
      OWNER: ${{ github.event.inputs.image_namespace || vars.IMAGE_NAMESPACE || github.repository_owner }}
      SERVICE: ${{ matrix.service }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Normalize image coordinates
        id: meta
        shell: bash
        run: |
          OWNER_TRIMMED="$(echo "${OWNER}" | xargs)"
          if [[ -z "${OWNER_TRIMMED}" ]]; then
            OWNER_TRIMMED="${GITHUB_REPOSITORY_OWNER}"
          fi

          echo "owner_lc=$(echo "${OWNER_TRIMMED}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "service_lc=$(echo "${SERVICE}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Validate image coordinates
        shell: bash
        run: |
          if [[ -z "${{ steps.meta.outputs.owner_lc }}" ]]; then
            echo "ERROR: image namespace/owner resolved to empty value"
            exit 1
          fi
          if [[ -z "${{ steps.meta.outputs.service_lc }}" ]]; then
            echo "ERROR: service name resolved to empty value"
            exit 1
          fi

      - name: Login to GHCR
        if: env.REGISTRY == 'ghcr.io'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Login to custom registry
        if: env.REGISTRY != 'ghcr.io'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Calculate image tags
        id: tags
        shell: bash
        run: |
          TAGS="sha-${GITHUB_SHA::12}"

          if [[ "${GITHUB_REF}" == "refs/heads/main" || "${GITHUB_REF}" == "refs/heads/master" ]]; then
            TAGS="$TAGS,v${GITHUB_RUN_NUMBER},latest"
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION_TAG="${GITHUB_REF#refs/tags/}"
            TAGS="$TAGS,$VERSION_TAG"
          fi

          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push image with Jib
        shell: bash
        run: |
          IMAGE="${REGISTRY}/${{ steps.meta.outputs.owner_lc }}/${{ steps.meta.outputs.service_lc }}"
          echo "Pushing ${IMAGE} with tags: ${{ steps.tags.outputs.tags }}"

          mvn -B -ntp -DskipTests \
            -pl "${SERVICE}" -am \
            compile \
            jib:build \
            -Djib.to.image="${IMAGE}" \
            -Djib.to.tags="${{ steps.tags.outputs.tags }}"

  deploy-to-server:
    name: Deploy To Local Self-Hosted
    runs-on: [self-hosted, windows]
    needs: build-and-push
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && vars.ENABLE_SERVER_DEPLOY == 'true'
    env:
      REGISTRY: ${{ github.event.inputs.registry || vars.CONTAINER_REGISTRY || 'ghcr.io' }}
      OWNER: ${{ github.event.inputs.image_namespace || vars.IMAGE_NAMESPACE || github.repository_owner }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Check deploy configuration
        shell: pwsh
        env:
          REGISTRY: ${{ env.REGISTRY }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          if ($env:REGISTRY -eq "ghcr.io") {
            if ([string]::IsNullOrWhiteSpace($env:GHCR_TOKEN) -and [string]::IsNullOrWhiteSpace($env:GITHUB_TOKEN)) {
              throw "GHCR requires GHCR_TOKEN or github.token"
            }
          } else {
            if ([string]::IsNullOrWhiteSpace($env:REGISTRY_USERNAME)) {
              throw "Missing required secret: REGISTRY_USERNAME"
            }
            if ([string]::IsNullOrWhiteSpace($env:REGISTRY_PASSWORD)) {
              throw "Missing required secret: REGISTRY_PASSWORD"
            }
          }

      - name: Deploy latest images with Docker Compose
        shell: pwsh
        env:
          REGISTRY: ${{ env.REGISTRY }}
          OWNER: ${{ env.OWNER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_TOKEN: ${{ github.token }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          $ownerLc = $env:OWNER.ToLowerInvariant()
          $services = @(
            "eureka-server",
            "config-server",
            "api-gateway",
            "auth-service",
            "user-service",
            "order-service",
            "inventory-service",
            "payment-service"
          )

          if ($env:REGISTRY -eq "ghcr.io") {
            $tokenToUse = if (-not [string]::IsNullOrWhiteSpace($env:GHCR_TOKEN)) { $env:GHCR_TOKEN } else { $env:GITHUB_TOKEN }
            $tokenToUse | docker login ghcr.io -u $ownerLc --password-stdin
          } else {
            $env:REGISTRY_PASSWORD | docker login $env:REGISTRY -u $env:REGISTRY_USERNAME --password-stdin
          }

          foreach ($service in $services) {
            $remoteImage = "$($env:REGISTRY)/$ownerLc/$service:latest"
            $localImage = "microservices/$service:local"
            docker pull $remoteImage
            docker tag $remoteImage $localImage
          }

          docker compose up -d --remove-orphans
          docker image prune -f
