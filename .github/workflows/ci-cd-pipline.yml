name: CI-CD-Pipline

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      registry:
        description: "Container registry (e.g., ghcr.io)"
        required: false
        default: "ghcr.io"
      image_namespace:
        description: "Image namespace/organization (default: repository owner)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka-server
          - config-server
          - api-gateway
          - auth-service
          - user-service
          - order-service
          - inventory-service
          - payment-service

    env:
      REGISTRY: ${{ github.event.inputs.registry || 'ghcr.io' }}
      OWNER: ${{ github.event.inputs.image_namespace || github.repository_owner }}
      SERVICE: ${{ matrix.service }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Normalize image coordinates
        id: meta
        shell: bash
        run: |
          OWNER_TRIMMED="$(echo "${OWNER}" | xargs)"
          if [[ -z "${OWNER_TRIMMED}" ]]; then
            OWNER_TRIMMED="${GITHUB_REPOSITORY_OWNER}"
          fi

          echo "owner_lc=$(echo "${OWNER_TRIMMED}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "service_lc=$(echo "${SERVICE}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Validate image coordinates
        shell: bash
        run: |
          if [[ -z "${{ steps.meta.outputs.owner_lc }}" ]]; then
            echo "ERROR: image namespace/owner resolved to empty value"
            exit 1
          fi
          if [[ -z "${{ steps.meta.outputs.service_lc }}" ]]; then
            echo "ERROR: service name resolved to empty value"
            exit 1
          fi

      - name: Login to GHCR
        if: env.REGISTRY == 'ghcr.io'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Login to custom registry
        if: env.REGISTRY != 'ghcr.io'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Calculate image tags
        id: tags
        shell: bash
        run: |
          TAGS="sha-${GITHUB_SHA::12}"

          if [[ "${GITHUB_REF}" == "refs/heads/main" || "${GITHUB_REF}" == "refs/heads/master" ]]; then
            TAGS="$TAGS,v${GITHUB_RUN_NUMBER},latest"
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION_TAG="${GITHUB_REF#refs/tags/}"
            TAGS="$TAGS,$VERSION_TAG"
          fi

          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push image with Jib
        shell: bash
        run: |
          IMAGE="${REGISTRY}/${{ steps.meta.outputs.owner_lc }}/${{ steps.meta.outputs.service_lc }}"
          echo "Pushing ${IMAGE} with tags: ${{ steps.tags.outputs.tags }}"

          mvn -B -ntp -DskipTests \
            -pl "${SERVICE}" -am \
            compile \
            jib:build \
            -Djib.to.image="${IMAGE}" \
            -Djib.to.tags="${{ steps.tags.outputs.tags }}"

  deploy-to-server:
    name: Deploy To Server
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Validate deploy secrets
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          missing=0
          for secret_name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH GHCR_TOKEN; do
            if [[ -z "${!secret_name}" ]]; then
              echo "ERROR: Missing required secret: ${secret_name}"
              missing=1
            fi
          done
          if [[ $missing -ne 0 ]]; then
            exit 1
          fi

      - name: Prepare SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy latest images with Docker Compose
        shell: bash
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          OWNER_LC="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"

          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT}" -o StrictHostKeyChecking=accept-new "${DEPLOY_USER}@${DEPLOY_HOST}" "bash -s" <<EOF
          set -e

          cd "${DEPLOY_PATH}"

          if [ -d .git ]; then
            git pull --ff-only
          fi

          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${OWNER_LC}" --password-stdin

          for service in eureka-server config-server api-gateway auth-service user-service order-service inventory-service payment-service; do
            docker pull "ghcr.io/${OWNER_LC}/${service}:latest"
            docker tag "ghcr.io/${OWNER_LC}/${service}:latest" "microservices/${service}:local"
          done

          docker compose up -d --remove-orphans
          docker image prune -f
          EOF
