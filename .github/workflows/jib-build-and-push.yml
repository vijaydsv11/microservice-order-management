name: Jib Build and Push

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      registry:
        description: "Container registry (e.g., ghcr.io)"
        required: false
        default: "ghcr.io"
      image_namespace:
        description: "Image namespace/organization (default: repository owner)"
        required: false
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build and Push (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - eureka-server
          - config-server
          - api-gateway
          - auth-service
          - user-service
          - order-service
          - inventory-service
          - payment-service

    env:
      REGISTRY: ${{ github.event.inputs.registry || 'ghcr.io' }}
      OWNER: ${{ github.event.inputs.image_namespace || github.repository_owner }}
      SERVICE: ${{ matrix.service }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Normalize image coordinates
        id: meta
        shell: bash
        run: |
          echo "owner_lc=vijaydsv11" >> "$GITHUB_OUTPUT"
          echo "service_lc=$(echo '${SERVICE}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: env.REGISTRY == 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to custom registry
        if: env.REGISTRY != 'ghcr.io'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Calculate image tags
        id: tags
        shell: bash
        run: |
          TAGS="sha-${GITHUB_SHA::12}"

          if [[ "${GITHUB_REF}" == "refs/heads/main" || "${GITHUB_REF}" == "refs/heads/master" ]]; then
            TAGS="$TAGS,latest"
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION_TAG="${GITHUB_REF#refs/tags/}"
            TAGS="$TAGS,$VERSION_TAG"
          fi

          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Build and push image with Jib
        shell: bash
        run: |
          IMAGE="${REGISTRY}/${{ steps.meta.outputs.owner_lc }}/${{ steps.meta.outputs.service_lc }}"
          echo "Pushing ${IMAGE} with tags: ${{ steps.tags.outputs.tags }}"

          mvn -B -ntp -DskipTests \
            -pl "${SERVICE}" -am \
            jib:build \
            -Djib.to.image="${IMAGE}" \
            -Djib.to.tags="${{ steps.tags.outputs.tags }}"
